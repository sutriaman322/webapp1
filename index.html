<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesan Spesial Idul Fitri</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: black;
    color: white;
    overflow: hidden;
    font-family: sans-serif;
}

/* Opening cinematic */
#opening {
    transition: opacity 2s;
}

/* Glow text */
.glow {
    text-shadow: 0 0 20px gold;
}

/* Card animasi */
.fade-in {
    animation: fadeIn 1.5s ease forwards;
}
@keyframes fadeIn {
    from {opacity:0; transform: scale(0.8);}
    to {opacity:1; transform: scale(1);}
}

/* Stars */
.star {
    position: absolute;
    background: gold;
    border-radius: 50%;
    animation: twinkle 2s infinite;
}
@keyframes twinkle {
    50% {opacity: 0.2;}
}
</style>
</head>

<body>

<!-- ⭐ STARS -->
<div id="stars"></div>

<!-- 🎬 OPENING -->
<div id="opening" class="fixed inset-0 flex items-center justify-center bg-black z-50">
    <div class="text-center">
        <p class="text-xl animate-pulse">Seseorang mengirim pesan untukmu...</p>
    </div>
</div>

<!-- 🎧 AUDIO -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/10/14/audio_3e44983058.mp3">
</audio>

<div class="flex items-center justify-center min-h-screen">

<div class="max-w-md w-full p-4">

<!-- FORM -->
<div id="form" class="bg-white text-black p-6 rounded-2xl">
    <h1 class="text-center font-bold mb-4">Buat Pesan</h1>
    <input id="to" class="w-full mb-3 p-3 border rounded-xl" placeholder="Nama penerima">
    <input id="from" class="w-full mb-3 p-3 border rounded-xl" placeholder="Nama kamu">

    <button onclick="generate()" class="w-full bg-green-700 text-white py-3 rounded-xl">
        Kirim Pesan 🔥
    </button>
</div>

<!-- CARD -->
<div id="card" class="hidden text-center">

    <h2 id="typing" class="text-xl mb-4 glow"></h2>

    <div class="bg-white text-black p-6 rounded-2xl fade-in">
        <h1 class="text-2xl font-bold text-green-900 mb-3">
            Selamat Idul Fitri 🌙
        </h1>

        <p class="mb-3">
            Mohon maaf lahir dan batin 🙏
        </p>

        <p id="fromText" class="font-bold"></p>

        <button onclick="shareWA()" class="mt-4 w-full bg-green-500 text-white py-2 rounded-xl">
            Share Sekarang 🚀
        </button>
    </div>

    <p class="mt-3 text-sm opacity-70">
        Kirim ke 5 orang terdekatmu 💌
    </p>

</div>

</div>
</div>

<script>
const music = document.getElementById("music");

/* 🎬 Opening */
window.onload = () => {
    setTimeout(() => {
        document.getElementById("opening").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("opening").remove();
        }, 2000);
    }, 2000);
};

/* ⭐ Stars generator */
for(let i=0;i<50;i++){
    let s = document.createElement("div");
    s.className="star";
    s.style.width="2px";
    s.style.height="2px";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    document.getElementById("stars").appendChild(s);
}

/* 🎧 Music fade */
function playMusic(){
    music.volume=0;
    music.play();
    let v=0;
    let i=setInterval(()=>{
        if(v<1){v+=0.05; music.volume=v;}
        else clearInterval(i);
    },200);
}

/* 🎙️ AI suara */
function speak(text){
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang="id-ID";
    speechSynthesis.speak(msg);
}

/* ✨ Typewriter */
function typeText(el, text){
    let i=0;
    el.innerHTML="";
    let inter=setInterval(()=>{
        if(i<text.length){
            el.innerHTML+=text[i];
            i++;
        } else clearInterval(inter);
    },50);
}

/* 🚀 Generate */
function generate(){
    const to = document.getElementById("to").value || "Sahabat";
    const from = document.getElementById("from").value || "Hamba Allah";

    playMusic();

    const data=btoa(JSON.stringify({to,from}));
    history.pushState({}, "", "?data="+data);

    showCard(to,from);
}

/* 💌 Show */
function showCard(to,from){
    document.getElementById("form").classList.add("hidden");

    const card=document.getElementById("card");
    card.classList.remove("hidden");

    typeText(document.getElementById("typing"), "Untuk "+to+"...");

    document.getElementById("fromText").innerText="Dari: "+from;

    speak("Pesan untuk "+to);
}

/* 🔗 Load URL */
function load(){
    const p=new URLSearchParams(location.search);
    const d=p.get("data");
    if(d){
        const obj=JSON.parse(atob(d));
        showCard(obj.to,obj.from);
        playMusic();
    }
}
load();

/* 📲 Share */
function shareWA(){
    const text=encodeURIComponent("Lihat pesan ini 😭\n"+location.href);
    window.open("https://wa.me/?text="+text);
}
</script>

</body>
</html>
