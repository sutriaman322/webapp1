<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesan Spesial Untukmu</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    color:white;
}

/* 🎥 Background video */
video {
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* Overlay gelap */
.overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* Glow */
.glow {
    text-shadow:0 0 20px gold;
}

/* Fade */
.fade-in {
    animation:fadeIn 2s forwards;
}
@keyframes fadeIn {
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

/* Avatar */
.avatar {
    width:120px;
    border-radius:50%;
    margin:auto;
    animation:float 3s infinite;
}
@keyframes float {
    50% { transform: translateY(-10px); }
}
</style>
</head>

<body>

<!-- 🎥 VIDEO BACKGROUND -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-night-sky-1080p.mp4">
</video>

<div class="overlay"></div>

<div class="flex items-center justify-center min-h-screen p-4">

<div class="max-w-md w-full text-center">

<!-- FORM -->
<div id="form" class="bg-black/60 p-6 rounded-2xl">
    <h1 class="mb-4 text-lg">Buat Pesan AI 🔥</h1>

    <input id="to" class="w-full mb-3 p-3 rounded-xl text-black" placeholder="Nama penerima">
    <input id="from" class="w-full mb-3 p-3 rounded-xl text-black" placeholder="Nama kamu">

    <button onclick="generate()" class="w-full bg-green-600 py-3 rounded-xl">
        Buat Sekarang 🚀
    </button>
</div>

<!-- CARD -->
<div id="card" class="hidden fade-in">

    <!-- Avatar -->
    <img src="https://i.imgur.com/6VBx3io.png" class="avatar">

    <h2 id="text" class="text-xl glow mt-4"></h2>

    <div class="bg-white text-black p-6 rounded-2xl mt-4">
        <h1 class="text-2xl font-bold text-green-900 mb-2">
            Selamat Idul Fitri 🌙
        </h1>

        <p class="mb-3">Mohon maaf lahir dan batin 🙏</p>

        <p id="fromText"></p>

        <button onclick="shareWA()" class="mt-4 w-full bg-green-500 text-white py-2 rounded-xl">
            Share Sekarang 🚀
        </button>
    </div>

</div>

</div>
</div>

<script>
/* 🎙️ AI suara */
function speak(text){
    let msg=new SpeechSynthesisUtterance(text);
    msg.lang="id-ID";
    speechSynthesis.speak(msg);
}

/* ✨ Typing */
function type(el,text){
    let i=0;
    el.innerHTML="";
    let inter=setInterval(()=>{
        if(i<text.length){
            el.innerHTML+=text[i++];
        } else clearInterval(inter);
    },40);
}

/* 🚀 Generate */
function generate(){
    const to=document.getElementById("to").value || "Sahabat";
    const from=document.getElementById("from").value || "Hamba Allah";

    const data=btoa(JSON.stringify({to,from}));
    history.pushState({}, "", "?data="+data);

    show(to,from);
}

/* 💌 Show */
function show(to,from){
    document.getElementById("form").classList.add("hidden");

    const card=document.getElementById("card");
    card.classList.remove("hidden");

    type(document.getElementById("text"), "Halo "+to+"...");

    document.getElementById("fromText").innerText="Dari: "+from;

    speak("Halo "+to+" ini pesan spesial untukmu");
}

/* 🔗 Load */
(function(){
    const p=new URLSearchParams(location.search);
    const d=p.get("data");
    if(d){
        const obj=JSON.parse(atob(d));
        show(obj.to,obj.from);
    }
})();

/* 📲 Share */
function shareWA(){
    const text=encodeURIComponent("Buka ini 😭\n"+location.href);
    window.open("https://wa.me/?text="+text);
}
</script>

</body>
</html>
